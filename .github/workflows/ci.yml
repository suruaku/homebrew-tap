name: Tap CI

on:
  push:
  pull_request:

jobs:
  formula-check:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Audit formula
        run: |
          brew tap suruaku/tap "$GITHUB_WORKSPACE"
          brew audit --formula suruaku/tap/upcloud-app-platform
